<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGDV FIFA ULTRA</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>

<style>
body{
    background:#000;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

.container{
    max-width:500px;
    margin:auto;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    background:#111;
    border:1px solid #333;
    color:#fff;
}

canvas{
    width:100%;
    border:2px solid #00ffcc;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
<h2>🔥 BGDV FIFA ULTRA</h2>

<input type="file" id="img">
<input type="text" id="nome" placeholder="Nome Jogador">
<input type="text" id="info" placeholder="Ex: 3 gols | MVP">
<input type="color" id="cor" value="#00ffcc">

<canvas id="c" width="1080" height="1080"></canvas>

<button onclick="baixar()">BAIXAR</button>
</div>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

let jogador = null;
let net = null;

// animação
let scale = 0.8;
let opacity = 0;

// IA
async function loadAI(){
    net = await bodyPix.load();
}
loadAI();

// upload
document.getElementById("img").onchange = async e=>{
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = async ev=>{
        let img = new Image();
        img.src = ev.target.result;

        img.onload = async ()=>{
            const seg = await net.segmentPerson(img);

            const temp = document.createElement("canvas");
            temp.width = img.width;
            temp.height = img.height;

            const tctx = temp.getContext("2d");
            tctx.drawImage(img,0,0);

            const data = tctx.getImageData(0,0,img.width,img.height);

            for(let i=0;i<data.data.length;i+=4){
                if(seg.data[i/4]===0){
                    data.data[i+3]=0;
                }
            }

            tctx.putImageData(data,0,0);

            jogador = temp;
            startAnim();
        }
    }

    reader.readAsDataURL(file);
};

// animação
function startAnim(){
    scale = 0.8;
    opacity = 0;

    function anim(){
        scale += 0.01;
        opacity += 0.02;

        if(scale > 1) scale = 1;
        if(opacity > 1) opacity = 1;

        draw();

        if(opacity < 1){
            requestAnimationFrame(anim);
        }
    }

    anim();
}

// draw
function draw(){
    const cor = document.getElementById("cor").value;
    const nome = document.getElementById("nome").value.toUpperCase();
    const info = document.getElementById("info").value;

    ctx.clearRect(0,0,1080,1080);

    // fundo estádio fake
    let bg = ctx.createLinearGradient(0,0,0,1080);
    bg.addColorStop(0,"#020202");
    bg.addColorStop(1,"#000");
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,1080,1080);

    // luz estádio
    let light = ctx.createRadialGradient(540,300,100,540,300,900);
    light.addColorStop(0, cor+"aa");
    light.addColorStop(0.3, cor+"33");
    light.addColorStop(1,"#000");
    ctx.fillStyle = light;
    ctx.fillRect(0,0,1080,1080);

    // partículas
    ctx.globalAlpha = 0.1;
    for(let i=0;i<50;i++){
        ctx.fillRect(Math.random()*1080, Math.random()*1080, 2,2);
    }
    ctx.globalAlpha = 1;

    // jogador
    if(jogador){
        ctx.globalAlpha = opacity;

        // sombra
        ctx.globalAlpha = 0.3;
        ctx.filter = "blur(25px)";
        ctx.drawImage(jogador,250,650,600,200);
        ctx.filter = "none";

        ctx.globalAlpha = opacity;

        // escala
        ctx.save();
        ctx.translate(540,540);
        ctx.scale(scale,scale);
        ctx.translate(-540,-540);

        ctx.shadowColor = cor;
        ctx.shadowBlur = 40;
        ctx.drawImage(jogador,200,150,700,700);
        ctx.restore();

        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
    }

    // overlay
    let overlay = ctx.createLinearGradient(0,700,0,1080);
    overlay.addColorStop(0,"transparent");
    overlay.addColorStop(1,"#000");
    ctx.fillStyle = overlay;
    ctx.fillRect(0,700,1080,380);

    // texto
    ctx.font="bold 100px Arial";
    ctx.fillStyle="#fff";
    ctx.textAlign="center";
    ctx.shadowColor=cor;
    ctx.shadowBlur=25;
    ctx.fillText(nome||"JOGADOR",540,900);

    ctx.shadowBlur=0;

    ctx.font="40px Arial";
    ctx.fillStyle="#ccc";
    ctx.fillText(info||"DESTAQUE",540,970);
}

// inputs
document.querySelectorAll("input").forEach(el=>{
    el.addEventListener("input",draw);
});

// download
function baixar(){
    let a=document.createElement("a");
    a.href=c.toDataURL();
    a.download="banner-fifa.png";
    a.click();
}

draw();
</script>

</body>
</html>
