<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGDV FIFA CARD AUTO</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>

<style>
body{background:#0a0a0a;color:#fff;font-family:Arial;text-align:center;}
.container{max-width:600px;margin:auto;background:#1a1a1a;padding:20px;border-radius:15px;}
input,button{
    width:100%;padding:10px;margin:5px 0;
    background:#111;border:1px solid #333;color:#fff;border-radius:8px;
}
canvas{width:100%;border:2px solid gold;border-radius:15px;margin-top:10px;}
</style>
</head>

<body>

<div class="container">
<h2>🔥 FIFA CARD AUTO (JOGOS REAIS)</h2>

<button onclick="buscarJogos()">📡 BUSCAR JOGOS DE HOJE</button>

<select id="listaJogos"></select>

<input type="file" id="img">

<input type="text" id="nome" placeholder="Nome jogador">
<input type="text" id="info" placeholder="Ex: MVP">

<input type="color" id="cor" value="#FFD700">

<input type="file" id="music">

<canvas id="c" width="1080" height="1400"></canvas>

<button onclick="gerarVideo()">🎬 GERAR VÍDEO</button>
</div>

<audio id="audio" loop></audio>

<script>
const c=document.getElementById("c");
const ctx=c.getContext("2d");

let jogador=null;
let net=null;
let t=0;

// dados jogo
let jogoAtual={};

// ================= IA =================
async function loadAI(){
    net=await bodyPix.load();
}
loadAI();

// ================= BUSCAR JOGOS =================
async function buscarJogos(){
    let res=await fetch("https://www.thesportsdb.com/api/v1/json/3/eventsday.php?d="+new Date().toISOString().split("T")[0]+"&s=Soccer");
    let data=await res.json();

    let select=document.getElementById("listaJogos");
    select.innerHTML="";

    data.events.forEach((j,i)=>{
        let opt=document.createElement("option");
        opt.value=i;
        opt.text=j.strEvent;
        select.appendChild(opt);
    });

    select.onchange=()=>{
        let j=data.events[select.value];

        jogoAtual={
            timeA:j.strHomeTeam,
            timeB:j.strAwayTeam,
            placar:(j.intHomeScore??"-")+" x "+(j.intAwayScore??"-"),
            status:j.strStatus || "HOJE"
        };
    };

    select.dispatchEvent(new Event("change"));
}

// ================= MÚSICA =================
document.getElementById("music").onchange=e=>{
    let file=e.target.files[0];
    let audio=document.getElementById("audio");
    audio.src=URL.createObjectURL(file);
    audio.play();
};

// ================= UPLOAD =================
document.getElementById("img").onchange=async e=>{
    let file=e.target.files[0];
    let reader=new FileReader();

    reader.onload=async ev=>{
        let img=new Image();
        img.src=ev.target.result;

        img.onload=async ()=>{
            const seg=await net.segmentPerson(img);

            const temp=document.createElement("canvas");
            temp.width=img.width;
            temp.height=img.height;
            const tctx=temp.getContext("2d");
            tctx.drawImage(img,0,0);

            const data=tctx.getImageData(0,0,img.width,img.height);

            for(let i=0;i<data.data.length;i+=4){
                if(seg.data[i/4]===0){
                    data.data[i+3]=0;
                }
            }

            tctx.putImageData(data,0,0);
            jogador=temp;
        }
    }
    reader.readAsDataURL(file);
};

// ================= DRAW =================
function draw(){
    const nome=document.getElementById("nome").value.toUpperCase();
    const info=document.getElementById("info").value;
    const cor=document.getElementById("cor").value;

    ctx.clearRect(0,0,1080,1400);

    // fundo
    let g=ctx.createLinearGradient(0,0,0,1400);
    g.addColorStop(0,"#111");
    g.addColorStop(1,"#000");
    ctx.fillStyle=g;
    ctx.fillRect(0,0,1080,1400);

    // header jogo
    ctx.fillStyle="rgba(0,0,0,0.7)";
    ctx.fillRect(0,0,1080,200);

    ctx.font="bold 50px Arial";
    ctx.fillStyle="#fff";
    ctx.textAlign="left";
    ctx.fillText(jogoAtual.timeA||"TIME A",50,120);

    ctx.textAlign="right";
    ctx.fillText(jogoAtual.timeB||"TIME B",1030,120);

    ctx.textAlign="center";
    ctx.font="bold 70px Arial";
    ctx.fillStyle=cor;
    ctx.fillText(jogoAtual.placar||"VS",540,120);

    ctx.font="30px Arial";
    ctx.fillStyle="#ccc";
    ctx.fillText(jogoAtual.status||"HOJE",540,60);

    // jogador
    if(jogador){
        ctx.drawImage(jogador,200,200,700,700);
    }

    // nome
    ctx.font="bold 100px Arial";
    ctx.fillStyle="#fff";
    ctx.fillText(nome||"JOGADOR",540,1050);

    ctx.font="40px Arial";
    ctx.fillStyle=cor;
    ctx.fillText(info||"DESTAQUE",540,1120);
}

// loop
function loop(){
    t+=0.05;
    draw();
    requestAnimationFrame(loop);
}
loop();

// ================= VIDEO =================
function gerarVideo(){
    const stream=c.captureStream(30);
    const audio=document.getElementById("audio");

    let tracks=[stream.getVideoTracks()[0]];

    if(audio.captureStream){
        let aStream=audio.captureStream();
        tracks.push(aStream.getAudioTracks()[0]);
    }

    const finalStream=new MediaStream(tracks);
    const rec=new MediaRecorder(finalStream);

    let chunks=[];
    rec.ondataavailable=e=>chunks.push(e.data);

    rec.onstop=()=>{
        let blob=new Blob(chunks,{type:"video/webm"});
        let url=URL.createObjectURL(blob);

        let a=document.createElement("a");
        a.href=url;
        a.download="video.webm";
        a.click();
    };

    rec.start();
    setTimeout(()=>rec.stop(),5000);
}
</script>

</body>
</html>
