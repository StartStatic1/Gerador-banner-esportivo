<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGDV FIFA CARD PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>

<style>
body{
    background:#000;
    color:#fff;
    font-family:Arial;
    text-align:center;
}
.container{max-width:500px;margin:auto;}
input{
    width:100%;
    padding:10px;
    margin:5px 0;
    background:#111;
    border:1px solid #333;
    color:#fff;
}
canvas{
    width:100%;
    border-radius:15px;
    border:2px solid gold;
}
button{
    width:100%;
    padding:10px;
    margin-top:5px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h2>🃏 BGDV FIFA CARD</h2>

<input type="file" id="img">
<input type="file" id="music">

<input type="text" id="nome" placeholder="Nome jogador/time">
<button onclick="buscar()">🔍 Buscar jogador</button>

<input type="text" id="info" placeholder="Ex: 90 OVR | ST">
<input type="color" id="cor" value="#FFD700">

<canvas id="c" width="1080" height="1080"></canvas>

<button onclick="baixarIMG()">📸 IMAGEM</button>
<button onclick="gerarVideo()">🎬 VÍDEO</button>
</div>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

let jogador=null;
let net=null;
let audio=null;

let t=0;

// IA
async function loadAI(){
    net = await bodyPix.load();
}
loadAI();

// ===================
// 🎵 MÚSICA MANUAL
// ===================
document.getElementById("music").onchange = e=>{
    const file = e.target.files[0];
    if(file){
        audio = new Audio(URL.createObjectURL(file));
        audio.loop = true;
        audio.volume = 0.5;
        audio.play();
    }
};

// ===================
// 🔍 BUSCAR JOGADOR
// ===================
async function buscar(){
    let nome = document.getElementById("nome").value;

    if(!nome) return;

    try{
        let res = await fetch(`https://api.dicebear.com/7.x/adventurer/png?seed=${nome}`);
        let blob = await res.blob();

        let img = new Image();
        img.src = URL.createObjectURL(blob);

        img.onload = ()=>{
            jogador = img;
        }
    }catch(e){
        alert("Erro ao buscar imagem");
    }
}

// ===================
// UPLOAD IMAGEM
// ===================
document.getElementById("img").onchange = async e=>{
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = async ev=>{
        let img = new Image();
        img.src = ev.target.result;

        img.onload = async ()=>{

            const tempCheck = document.createElement("canvas");
            tempCheck.width=img.width;
            tempCheck.height=img.height;
            const checkCtx=tempCheck.getContext("2d");
            checkCtx.drawImage(img,0,0);

            const pixels = checkCtx.getImageData(0,0,img.width,img.height).data;

            let hasAlpha=false;
            for(let i=3;i<pixels.length;i+=4){
                if(pixels[i]<255){hasAlpha=true;break;}
            }

            if(hasAlpha){
                jogador=img;
                return;
            }

            const seg = await net.segmentPerson(img);

            const temp=document.createElement("canvas");
            temp.width=img.width;
            temp.height=img.height;
            const tctx=temp.getContext("2d");
            tctx.drawImage(img,0,0);

            const data=tctx.getImageData(0,0,img.width,img.height);

            for(let i=0;i<data.data.length;i+=4){
                if(seg.data[i/4]===0){
                    data.data[i+3]=0;
                }
            }

            tctx.putImageData(data,0,0);
            jogador=temp;
        }
    }

    reader.readAsDataURL(file);
};

// ===================
// DRAW FIFA CARD
// ===================
function draw(){

    const nome=document.getElementById("nome").value.toUpperCase();
    const info=document.getElementById("info").value;
    const cor=document.getElementById("cor").value;

    ctx.clearRect(0,0,1080,1080);

    // fundo carta
    let g=ctx.createLinearGradient(0,0,0,1080);
    g.addColorStop(0,"#111");
    g.addColorStop(1,"#000");
    ctx.fillStyle=g;
    ctx.fillRect(0,0,1080,1080);

    // borda dourada
    ctx.strokeStyle=cor;
    ctx.lineWidth=15;
    ctx.strokeRect(50,50,980,980);

    // brilho animado
    ctx.globalAlpha=0.2;
    ctx.fillStyle=cor;
    ctx.fillRect(50 + Math.sin(t)*30,50,200,980);
    ctx.globalAlpha=1;

    if(jogador){

        let altura=jogador.height;
        let isTronco = altura < 900;

        if(!isTronco){
            ctx.save();
            ctx.translate(540,780);
            ctx.scale(1.3,0.3);
            ctx.beginPath();
            ctx.arc(0,0,300,0,Math.PI*2);
            ctx.fillStyle="rgba(0,0,0,0.6)";
            ctx.fill();
            ctx.restore();
        }

        ctx.drawImage(jogador,200,150,700,700);
    }

    // nome
    ctx.font="bold 90px Arial";
    ctx.fillStyle="#fff";
    ctx.textAlign="center";
    ctx.fillText(nome||"PLAYER",540,900);

    // info
    ctx.font="50px Arial";
    ctx.fillStyle=cor;
    ctx.fillText(info||"90 OVR",540,970);
}

// loop
function loop(){
    t+=0.05;
    draw();
    requestAnimationFrame(loop);
}
loop();

// baixar
function baixarIMG(){
    let a=document.createElement("a");
    a.href=c.toDataURL();
    a.download="card.png";
    a.click();
}

// vídeo
function gerarVideo(){
    const stream = c.captureStream(30);
    const recorder = new MediaRecorder(stream);

    let chunks=[];

    recorder.ondataavailable=e=>chunks.push(e.data);

    recorder.onstop=()=>{
        const blob=new Blob(chunks,{type:"video/webm"});
        const url=URL.createObjectURL(blob);

        let a=document.createElement("a");
        a.href=url;
        a.download="card.webm";
        a.click();
    };

    recorder.start();
    setTimeout(()=>recorder.stop(),5000);
}
</script>

</body>
</html>
