<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGDV FIFA PRO</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>

<style>
body{
    background:#000;
    color:#fff;
    font-family:Arial;
    text-align:center;
}

.container{
    max-width:500px;
    margin:auto;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    background:#111;
    border:1px solid #333;
    color:#fff;
}

canvas{
    width:100%;
    border:2px solid #00ffcc;
    border-radius:10px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
<h2>🔥 BGDV FIFA PRO</h2>

<input type="file" id="img">
<input type="text" id="nome" placeholder="Nome Jogador">
<input type="text" id="info" placeholder="Ex: 2 Gols | MVP">
<input type="color" id="cor" value="#00ffcc">

<canvas id="c" width="1080" height="1080"></canvas>

<button onclick="baixar()">BAIXAR</button>
</div>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");

let jogador = null;
let net = null;

// carregar IA
async function loadAI(){
    net = await bodyPix.load();
}
loadAI();

// upload imagem
document.getElementById("img").onchange = async e=>{
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = async ev=>{
        let img = new Image();
        img.src = ev.target.result;

        img.onload = async ()=>{
            const segmentation = await net.segmentPerson(img);

            const canvasTemp = document.createElement("canvas");
            canvasTemp.width = img.width;
            canvasTemp.height = img.height;

            const ctxTemp = canvasTemp.getContext("2d");
            ctxTemp.drawImage(img,0,0);

            const imgData = ctxTemp.getImageData(0,0,img.width,img.height);

            for(let i=0;i<imgData.data.length;i+=4){
                if(segmentation.data[i/4]===0){
                    imgData.data[i+3]=0;
                }
            }

            ctxTemp.putImageData(imgData,0,0);

            jogador = canvasTemp;
            draw();
        }
    }

    reader.readAsDataURL(file);
};

// desenhar
function draw(){
    const cor = document.getElementById("cor").value;
    const nome = document.getElementById("nome").value.toUpperCase();
    const info = document.getElementById("info").value;

    ctx.fillStyle="#000";
    ctx.fillRect(0,0,1080,1080);

    // luz estilo FIFA
    let g = ctx.createRadialGradient(540,400,100,540,400,700);
    g.addColorStop(0, cor+"99");
    g.addColorStop(1, "#000");
    ctx.fillStyle=g;
    ctx.fillRect(0,0,1080,1080);

    // jogador recortado
    if(jogador){
        ctx.drawImage(jogador,200,150,700,700);
    }

    // flare
    ctx.fillStyle=cor;
    ctx.globalAlpha=0.1;
    ctx.fillRect(0,700,1080,300);
    ctx.globalAlpha=1;

    // nome
    ctx.font="bold 90px Arial";
    ctx.fillStyle="#fff";
    ctx.textAlign="center";
    ctx.shadowColor=cor;
    ctx.shadowBlur=30;
    ctx.fillText(nome||"JOGADOR",540,900);

    ctx.shadowBlur=0;

    // info
    ctx.font="40px Arial";
    ctx.fillText(info||"DESTAQUE",540,970);
}

// atualizar
document.querySelectorAll("input").forEach(el=>{
    el.addEventListener("input",draw);
});

// download
function baixar(){
    let a=document.createElement("a");
    a.href=c.toDataURL();
    a.download="banner-fifa.png";
    a.click();
}

draw();
</script>

</body>
</html>
