<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BGDV FIFA CARD PRO V2</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Kanit:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>

    <style>
        :root { --gold: #FFD700; --dark: #0a0a0a; }
        body { background: #000; color: #fff; font-family: 'Kanit', sans-serif; text-align: center; margin: 0; padding: 10px; }
        .container { max-width: 600px; margin: auto; background: #111; padding: 15px; border-radius: 20px; }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        input, select { 
            background: #1a1a1a; border: 1px solid #333; color: #fff; 
            padding: 12px; border-radius: 8px; font-size: 14px;
        }
        .full { grid-column: span 2; }

        canvas { width: 100%; border-radius: 15px; box-shadow: 0 0 20px rgba(255, 215, 0, 0.2); margin-top: 10px; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button { 
            flex: 1; padding: 15px; font-weight: bold; border-radius: 10px; border: none;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .btn-img { background: #fff; color: #000; }
        .btn-vid { background: var(--gold); color: #000; }
        
        /* Loading da IA */
        #status { font-size: 12px; color: var(--gold); margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0">🃏 BGDV FIFA PRO</h2>
    <div id="status">⚡ Carregando IA...</div>

    <div class="grid-inputs">
        <label class="full">Foto Jogador (PNG): <input type="file" id="img" accept="image/*"></label>
        <label class="full">Música de Fundo: <input type="file" id="music" accept="audio/*"></label>
        
        <input type="text" id="nome" placeholder="NOME DO JOGADOR">
        <input type="text" id="time" placeholder="TIME (Ex: Flamengo)">
        
        <input type="text" id="info" placeholder="OVR (Ex: 99)">
        <input type="text" id="posicao" placeholder="POS (Ex: ST / GK)">
        
        <select id="tema">
            <option value="gold">CARTA OURO</option>
            <option value="flashback">FLASHBACK (ROXO)</option>
            <option value="tots">TOTS (AZUL)</option>
        </select>
        <input type="color" id="cor" value="#FFD700">
    </div>

    <canvas id="c" width="1080" height="1350"></canvas>

    <div class="btn-group">
        <button class="btn-img" onclick="baixarIMG()">📸 SALVAR FOTO</button>
        <button class="btn-vid" id="btnVid" onclick="gerarVideo()">🎬 GERAR REELS</button>
    </div>
</div>

<script>
const c = document.getElementById("c");
const ctx = c.getContext("2d");
let jogador = null, net = null, audioCtx = null, source = null, dest = null;
let t = 0;

// Iniciar IA
async function loadAI(){
    net = await bodyPix.load();
    document.getElementById("status").innerText = "✅ IA PRONTA PARA REMOVER FUNDO";
}
loadAI();

// Config Áudio para Exportação
function setupAudio(file) {
    if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    dest = audioCtx.createMediaStreamDestination();
    
    const url = URL.createObjectURL(file);
    const audio = new Audio(url);
    audio.loop = true;
    
    source = audioCtx.createMediaElementSource(audio);
    source.connect(audioCtx.destination); // Tocar no alto-falante
    source.connect(dest); // Mandar para o gravador
    audio.play();
}

document.getElementById("music").onchange = e => { if(e.target.files[0]) setupAudio(e.target.files[0]); };

// Upload com IA (Melhorado)
document.getElementById("img").onchange = async e => {
    const file = e.target.files[0];
    const img = new Image();
    img.src = URL.createObjectURL(file);
    img.onload = async () => {
        document.getElementById("status").innerText = "⏳ PROCESSANDO RECORTE...";
        const seg = await net.segmentPerson(img);
        const temp = document.createElement("canvas");
        temp.width = img.width; temp.height = img.height;
        const tctx = temp.getContext("2d");
        tctx.drawImage(img, 0, 0);
        const data = tctx.getImageData(0, 0, img.width, img.height);
        for(let i=0; i<data.data.length; i+=4) { if(seg.data[i/4] === 0) data.data[i+3] = 0; }
        tctx.putImageData(data, 0, 0);
        jogador = temp;
        document.getElementById("status").innerText = "✅ RECORTE CONCLUÍDO";
    };
};

function draw() {
    const nome = document.getElementById("nome").value || "PLAYER NAME";
    const time = document.getElementById("time").value || "TEAM FC";
    const ovr = document.getElementById("info").value || "99";
    const pos = document.getElementById("posicao").value || "ST";
    const cor = document.getElementById("cor").value;

    ctx.clearRect(0,0,1080,1350);

    // Fundo Dinâmico (Sintonizado)
    let g = ctx.createRadialGradient(540, 500, 100, 540, 500, 800);
    g.addColorStop(0, "#222");
    g.addColorStop(1, "#000");
    ctx.fillStyle = g;
    ctx.fillRect(0,0,1080,1350);

    // Efeito de Brilho (Pulsante que você gostou)
    ctx.save();
    ctx.globalAlpha = 0.1 + Math.abs(Math.sin(t)) * 0.2;
    ctx.fillStyle = cor;
    ctx.beginPath();
    ctx.arc(540, 450, 400 + Math.sin(t)*50, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // Desenha Jogador
    if(jogador) {
        // Sombra projetada
        ctx.shadowColor = "rgba(0,0,0,0.8)";
        ctx.shadowBlur = 30;
        ctx.drawImage(jogador, 140, 100, 800, 800);
        ctx.shadowBlur = 0;
    }

    // Moldura Estilizada
    ctx.strokeStyle = cor;
    ctx.lineWidth = 15;
    ctx.beginPath();
    ctx.moveTo(100, 50); ctx.lineTo(980, 50); ctx.lineTo(980, 1200);
    ctx.lineTo(540, 1300); ctx.lineTo(100, 1200); ctx.closePath();
    ctx.stroke();

    // Textos Estilo FIFA
    ctx.textAlign = "center";
    
    // OVR e POS (Canto Esquerdo)
    ctx.fillStyle = cor;
    ctx.font = "bold 120px Oswald";
    ctx.fillText(ovr, 220, 250);
    ctx.font = "50px Kanit";
    ctx.fillText(pos, 220, 310);

    // Nome
    ctx.fillStyle = "#fff";
    ctx.font = "900 100px Kanit";
    ctx.fillText(nome.toUpperCase(), 540, 1000);
    
    // Time
    ctx.font = "400 50px Kanit";
    ctx.fillStyle = cor;
    ctx.fillText(time.toUpperCase(), 540, 1070);

    t += 0.04;
}

function loop() { draw(); requestAnimationFrame(loop); }
loop();

function baixarIMG() {
    const link = document.createElement("a");
    link.download = "fifa-card.png";
    link.href = c.toDataURL("image/png");
    link.click();
}

async function gerarVideo() {
    const btn = document.getElementById("btnVid");
    btn.innerText = "⏺ GRAVANDO (5s)...";
    
    const canvasStream = c.captureStream(30);
    
    // MIXER DE ÁUDIO + VÍDEO
    const tracks = [...canvasStream.getTracks()];
    if(dest) tracks.push(...dest.stream.getTracks());
    
    const combinedStream = new MediaStream(tracks);
    const recorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm;codecs=vp9' });
    let chunks = [];

    recorder.ondataavailable = e => chunks.push(e.data);
    recorder.onstop = () => {
        const blob = new Blob(chunks, { type: "video/webm" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "card-video.webm";
        a.click();
        btn.innerText = "🎬 GERAR REELS";
    };

    recorder.start();
    setTimeout(() => recorder.stop(), 5000);
}
</script>
</body>
</html>
